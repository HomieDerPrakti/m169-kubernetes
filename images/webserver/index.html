
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: var(--font-sans); }
.container { display: flex; flex-direction: column; height: 600px; padding: 1rem 0; }
.tab-bar { display: flex; gap: 8px; margin-bottom: 12px; flex-wrap: wrap; }
.tab { display: flex; align-items: center; gap: 8px; padding: 8px 16px; border: 0.5px solid var(--color-border-secondary); border-radius: var(--border-radius-md); cursor: pointer; background: var(--color-background-secondary); color: var(--color-text-secondary); font-size: 14px; font-weight: 400; transition: background 0.15s, color 0.15s; user-select: none; }
.tab:hover { background: var(--color-background-primary); color: var(--color-text-primary); }
.tab.active { background: var(--color-background-primary); color: var(--color-text-primary); border-color: var(--color-border-primary); font-weight: 500; }
.tab .dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }
.iframe-area { flex: 1; border: 0.5px solid var(--color-border-tertiary); border-radius: var(--border-radius-lg); overflow: hidden; background: #1a1a1a; }
iframe { width: 100%; height: 100%; border: none; display: none; }
iframe.active { display: block; }
</style>

<div class="container">
  <div class="tab-bar" id="tabs"></div>
  <div class="iframe-area" id="frames"></div>
</div>

<script>
const distros = [
  { id: "arch",         label: "Arch Linux",    color: "#1793d1", path: "/arch/" },
  { id: "debian",       label: "Debian",         color: "#a80030", path: "/debian/" },
  { id: "fedora",       label: "Fedora",         color: "#3c6eb4", path: "/fedora/" },
  { id: "opensuse",     label: "openSUSE Leap",  color: "#73ba25", path: "/opensuse/" },
  { id: "ubuntu",       label: "Ubuntu",         color: "#e95420", path: "/ubuntu/" },
];

const tabBar = document.getElementById("tabs");
const frameArea = document.getElementById("frames");

distros.forEach((d, i) => {
  const tab = document.createElement("div");
  tab.className = "tab" + (i === 0 ? " active" : "");
  tab.innerHTML = `<span class="dot" style="background:${d.color}"></span>${d.label}`;
  tab.addEventListener("click", () => activate(d.id));
  tab.dataset.id = d.id;
  tabBar.appendChild(tab);

  const frame = document.createElement("iframe");
  frame.src = d.path;
  frame.className = i === 0 ? "active" : "";
  frame.dataset.id = d.id;
  frameArea.appendChild(frame);
});

function activate(id) {
  document.querySelectorAll(".tab").forEach(t => t.classList.toggle("active", t.dataset.id === id));
  document.querySelectorAll("iframe").forEach(f => f.classList.toggle("active", f.dataset.id === id));
}
</script>
